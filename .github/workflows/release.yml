name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Choose versioning strategy?"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Compute next version
        id: version
        run: |
          current=$(grep -E '^pluginVersion\s*=' gradle.properties | sed -E 's/^pluginVersion\s*=\s*//' | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ github.event.inputs.release_type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "tag=v$new" >> "$GITHUB_OUTPUT"
          echo "Podbijam $current -> $new (${{ github.event.inputs.release_type }})"

      - name: Bump version in gradle.properties
        run: |
          sed -i -E "s/^(pluginVersion\s*=\s*).*/\1${{ steps.version.outputs.new }}/" gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        # Avoid intermittent ClosedFileSystemException in IntelliJ Platform dependency resolution on GitHub runners.
        run: ./gradlew --no-configuration-cache --no-parallel buildPlugin

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore(release): ${{ steps.version.outputs.tag }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin master
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ""
          files: build/distributions/*.zip
