name: CI

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        # Avoid intermittent ClosedFileSystemException in IntelliJ Platform dependency resolution on GitHub runners.
        run: ./gradlew --no-configuration-cache --no-parallel buildPlugin

      - name: Verify plugin
        run: ./gradlew --no-configuration-cache --no-parallel verifyPlugin
